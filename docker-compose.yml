services:
  # 一次性执行模式（手动运行）
  daily-sync:
    image: 'daily-sync:latest'
    build:
      context: ./
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: daily-sync
    profiles: ["manual"]
    # 可选命令（取消注释以启用）：
    # 同步国际区 → 中国区（默认，适合大多数用户）
    command: yarn sync:global2cn
    # 同步中国区 → 国际区
    # command: yarn sync:cn2global
    # 迁移中国区 → 国际区
    # command: yarn migrate:cn2global
    # 迁移国际区 → 中国区
    # command: yarn migrate:global2cn
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs

  # 定时同步模式（每小时自动执行，推荐长期使用）
  daily-sync-cron:
    image: 'daily-sync-cron:latest'
    build:
      context: ./
      dockerfile: Dockerfile.cron
    env_file:
      - .env
    container_name: daily-sync-cron
    profiles: ["cron"]
    # 同步方向：global2cn（默认）或 cn2global
    environment:
      - SYNC_DIRECTION=global2cn
      # Cron 调度（默认每小时整点），可自定义：
      # 每30分钟: */30 * * * *
      # 每2小时:  0 */2 * * *
      - CRON_SCHEDULE=0 * * * *
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "bash", "-c", "ls -la /app/db/garmin.db || exit 0"]
      interval: 1h
      timeout: 10s
      retries: 3
