name: Sync Garmin CN to Garmin Global

on:
  workflow_dispatch:
  schedule:
    # 每6小时检查一次
    - cron: "0 */6 * * *"
  push:
    branches:
      - main

# 并发控制：如果当前有任务正在运行，取消旧任务或排队，防止冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Garmin 账号配置（必填）
  AESKEY: ${{ secrets.AESKEY }}
  GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
  GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}
  # 同步参数（可选）
  GARMIN_SYNC_NUM: ${{ secrets.GARMIN_SYNC_NUM }}
  GARMIN_SYNC_DELAY: ${{ secrets.GARMIN_SYNC_DELAY }}
  GARMIN_REQUEST_TIMEOUT: ${{ secrets.GARMIN_REQUEST_TIMEOUT }}
  # 通知配置（可选）
  BARK_KEY: ${{ secrets.BARK_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync Garmin CN to Garmin Global
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src
            db
            package.json
            yarn.lock
            tsconfig.json

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Cache Session Database
        uses: actions/cache@v4
        with:
          path: db/garmin.db
          key: garmin-session-${{ github.repository }}-cn2global-${{ github.run_id }}
          restore-keys: |
            garmin-session-${{ github.repository }}-cn2global-

      - run: yarn --frozen-lockfile --prefer-offline
        name: Install dependencies

      - run: yarn sync:cn2global
        timeout-minutes: 10
