name: Migrate Garmin CN to Garmin Global

on:
  workflow_dispatch:

env:
  # 强制 Github Actions 使用 Node.js 24 消除过期警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Garmin 账号配置（必填）
  AESKEY: ${{ secrets.AESKEY }}
  GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
  GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}
  # 迁移参数（可选）
  GARMIN_MIGRATE_NUM: ${{ secrets.GARMIN_MIGRATE_NUM }}
  GARMIN_MIGRATE_START: ${{ secrets.GARMIN_MIGRATE_START }}
  GARMIN_REQUEST_TIMEOUT: ${{ secrets.GARMIN_REQUEST_TIMEOUT }}
  # 通知配置（可选）
  BARK_KEY: ${{ secrets.BARK_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Migrate Garmin CN to Garmin Global
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src
            db
            package.json
            yarn.lock
            tsconfig.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Cache Session Database
        uses: actions/cache@v4
        with:
          path: db/garmin.db
          key: garmin-session-${{ github.repository }}-migrate-cn2global-${{ github.run_id }}
          restore-keys: |
            garmin-session-${{ github.repository }}-migrate-cn2global-

      - run: yarn --frozen-lockfile --prefer-offline
        name: Install dependencies

      - run: yarn migrate:cn2global
