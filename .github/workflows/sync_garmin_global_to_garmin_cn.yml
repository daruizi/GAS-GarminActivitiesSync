name: Sync Garmin Global to Garmin CN

on:
  workflow_dispatch:
  schedule:
    # 每1小时检查一次 (UTC时间，相当于北京时间的每个整点)
    - cron: "0 * * * *"

# 并发控制：如果当前有任务正在运行，取消旧任务或排队，防止冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # please change to your own config.
  AESKEY: ${{ secrets.AESKEY }}
  RQ_COOKIE: ${{ secrets.RQ_COOKIE }}
  RQ_CSRF_TOKEN: ${{ secrets.RQ_CSRF_TOKEN }}
  RQ_USERID: ${{ secrets.RQ_USERID }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_API_CLIENT_EMAIL: ${{ secrets.GOOGLE_API_CLIENT_EMAIL }}
  GOOGLE_API_PRIVATE_KEY: ${{ secrets.GOOGLE_API_PRIVATE_KEY }}
  BARK_KEY: ${{ secrets.BARK_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
  GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
  GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Sync Garmin Global to Garmin CN
    # 增加 Job 级别的超时限制，防止意外卡死消耗资源
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      # 从缓存恢复 Session 数据库
      - name: Restore Session Cache
        uses: actions/cache@v4
        with:
          path: db/garmin.db
          key: garmin-session-${{ github.repository }}-global2cn
          restore-keys: |
            garmin-session-${{ github.repository }}-global2cn

      - run: yarn

      - run: yarn sync:global2cn
        timeout-minutes: 10
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
