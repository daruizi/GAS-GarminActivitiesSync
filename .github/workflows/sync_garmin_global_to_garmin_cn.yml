name: Sync Garmin Global to Garmin CN

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new_activity]
  schedule:
    # 每日兜底：UTC 00:30 = 北京时间 08:30（晨跑结束后，接住 webhook 漏网事件；:30 错峰避开整点调度拥堵）
    - cron: "30 0 * * *"

# 并发控制：排队等待，防止多个实例同时操作导致 DB 冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # 强制 Github Actions 使用 Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Garmin 账号配置（必填）
  AESKEY: ${{ secrets.AESKEY }}
  GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
  GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}
  # 同步参数（可选）
  GARMIN_SYNC_NUM: ${{ secrets.GARMIN_SYNC_NUM }}
  GARMIN_SYNC_DELAY: ${{ secrets.GARMIN_SYNC_DELAY }}
  GARMIN_REQUEST_TIMEOUT: ${{ secrets.GARMIN_REQUEST_TIMEOUT }}
  # 通知配置（可选）
  BARK_KEY: ${{ secrets.BARK_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync Garmin Global to Garmin CN
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src
            db
            package.json
            yarn.lock
            tsconfig.json

      - name: Log trigger source
        if: github.event_name == 'repository_dispatch'
        run: echo "Triggered by Strava webhook, activity_id=${{ github.event.client_payload.strava_activity_id }}"

      # 防止公开仓库 60 天无提交导致 schedule 触发被 GitHub 自动禁用（不影响 repository_dispatch）
      - uses: gautamkrishnar/keepalive-workflow@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      # 改进的缓存策略：使用固定 key + hash，提高缓存命中率
      - name: Cache Session Database
        uses: actions/cache@v4
        with:
          path: db/garmin.db
          # 使用周级别 key，避免每次都生成新 cache，同时保证 session 不会太旧
          key: garmin-session-${{ github.repository }}-global2cn-${{ github.run_number }}
          restore-keys: |
            garmin-session-${{ github.repository }}-global2cn-

      - run: yarn --frozen-lockfile --prefer-offline
        name: Install dependencies

      - name: Run sync (Global → CN)
        run: yarn sync:global2cn
        timeout-minutes: 10

      # 同步后保存 cache（即使同步失败也保存，保留 session 数据）
      - name: Save Session Database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: db/garmin.db
          key: garmin-session-${{ github.repository }}-global2cn-${{ github.run_number }}
